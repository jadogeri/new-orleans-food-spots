openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: New Orleans Food Spots API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: businesses
    description: Saved food spots
  - name: yelp
    description: Yelp search proxy

paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a temporary password via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: OK (email sent if account exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using the temporary password from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Invalid or expired temporary password

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /businesses:
    get:
      operationId: getBusinesses
      tags: [businesses]
      summary: Get saved food spots
      responses:
        "200":
          description: List of saved spots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"
        "401":
          description: Unauthorized

    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Save a food spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "400":
          description: Already saved

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a saved spot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found

    put:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a saved spot (liked/visited)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Remove a saved spot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /businesses/stats:
    get:
      operationId: getBusinessStats
      tags: [businesses]
      summary: Get saved spots stats (total, liked, visited)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessStats"

  /yelp/search:
    get:
      operationId: searchYelp
      tags: [yelp]
      summary: Search Yelp for food spots in New Orleans
      parameters:
        - name: term
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Yelp results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YelpSearchResult"

  /yelp/businesses/{id}:
    get:
      operationId: getYelpBusiness
      tags: [yelp]
      summary: Get a specific Yelp business by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Yelp business detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YelpBusiness"

components:
  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [email, currentPassword, newPassword]
      properties:
        email:
          type: string
          format: email
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, email]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string

    BusinessInput:
      type: object
      required: [business_id, detail]
      properties:
        business_id:
          type: string
        detail:
          $ref: "#/components/schemas/BusinessDetail"
        liked:
          type: boolean
        visited:
          type: boolean

    BusinessUpdate:
      type: object
      properties:
        liked:
          type: boolean
        visited:
          type: boolean

    Business:
      type: object
      required: [id, business_id, detail]
      properties:
        id:
          type: string
        business_id:
          type: string
        detail:
          $ref: "#/components/schemas/BusinessDetail"
        liked:
          type: boolean
        visited:
          type: boolean
        created_at:
          type: string

    BusinessDetail:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        image_url:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        reviews:
          type: ["integer", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        transactions:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string

    BusinessStats:
      type: object
      required: [total, liked, visited]
      properties:
        total:
          type: integer
        liked:
          type: integer
        visited:
          type: integer

    YelpBusiness:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        image_url:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        review_count:
          type: ["integer", "null"]
        price:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        is_closed:
          type: boolean
        url:
          type: ["string", "null"]
        categories:
          type: array
          items:
            $ref: "#/components/schemas/YelpCategory"
        location:
          $ref: "#/components/schemas/YelpLocation"
        coordinates:
          $ref: "#/components/schemas/YelpCoordinates"
        transactions:
          type: array
          items:
            type: string
        photos:
          type: array
          items:
            type: string

    YelpCategory:
      type: object
      required: [alias, title]
      properties:
        alias:
          type: string
        title:
          type: string

    YelpLocation:
      type: object
      properties:
        address1:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        zip_code:
          type: ["string", "null"]
        display_address:
          type: array
          items:
            type: string

    YelpCoordinates:
      type: object
      properties:
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]

    YelpSearchResult:
      type: object
      required: [businesses, total]
      properties:
        businesses:
          type: array
          items:
            $ref: "#/components/schemas/YelpBusiness"
        total:
          type: integer
